<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orientation Visualizer | PathLogic</title>
    <style>
        :root {
            --primary: #007AFF;
            --surface: #1C1C1E;
            --bg: #000000;
            --text: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, var(--glass) 0%, transparent 70%);
            border-radius: 50%;
            border: 1px solid var(--glass);
            margin-bottom: 40px;
            box-shadow: 0 0 40px rgba(0, 122, 255, 0.1);
        }

        /* Compass Markings */
        .compass-ring {
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 2px dashed var(--glass);
        }

        .cardinal {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.4);
        }
        .n { top: 0; transform: translateY(-20px); }
        .e { right: 0; transform: translateX(20px); }
        .s { bottom: 0; transform: translateY(20px); }
        .w { left: 0; transform: translateX(-20px); }

        /* The Arrow */
        .arrow-wrapper {
            width: 80px;
            height: 80px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 15px rgba(0, 122, 255, 0.6));
        }

        svg#user-arrow {
            width: 100%;
            height: 100%;
        }

        /* Controls */
        .controls {
            background: var(--surface);
            padding: 24px;
            border-radius: 20px;
            width: 300px;
            border: 1px solid var(--glass);
            backdrop-filter: blur(10px);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.8;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary);
        }

        input[type="number"] {
            background: var(--glass);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 50px;
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
        }

        .value-display {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 30px;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="value-display" id="degree-text">0°</div>

    <div class="container">
        <div class="compass-ring"></div>
        <div class="cardinal n">N</div>
        <div class="cardinal e">E</div>
        <div class="cardinal s">S</div>
        <div class="cardinal w">W</div>
        
        <div class="arrow-wrapper" id="arrow">
            <svg id="user-arrow" viewBox="0 0 100 100">
                <!-- Outer Ring -->
                <circle cx="50" cy="50" r="45" fill="none" stroke="rgba(0,122,255,0.2)" stroke-width="2"/>
                <!-- Pulse Core -->
                <circle cx="50" cy="50" r="12" fill="#007AFF"/>
                <!-- Direction Pointer -->
                <path d="M50 15 L35 75 L50 65 L65 75 Z" fill="#FFFFFF" />
            </svg>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="label-row">
                <span>Degrees</span>
                <span>
                    <input type="number" id="num-input" value="0" step="0.01" style="width: 80px;"> °
                </span>
            </div>
            <input type="range" id="angle-slider" min="0" max="360" value="0">
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>Radians</span>
                <span>
                    <input type="number" id="rad-input" value="0.000000" step="0.000001" style="width: 80px;"> rad
                </span>
            </div>
        </div>
        
        <div class="stats">
            <div>RAD (raw): <span id="rad-text">0.00</span></div>
            <div>STATUS: STABLE</div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('angle-slider');
        const degInput = document.getElementById('num-input');
        const radInput = document.getElementById('rad-input');
        const arrow = document.getElementById('arrow');
        const degreeText = document.getElementById('degree-text');
        const radText = document.getElementById('rad-text');

        function updateFromDeg(value) {
            const deg = parseFloat(value) || 0;
            const rad = (deg * Math.PI / 180);
            applyUpdate(deg, rad);
        }

        function updateFromRad(value) {
            const rad = parseFloat(value) || 0;
            const deg = (rad * 180 / Math.PI);
            applyUpdate(deg, rad);
        }

        function applyUpdate(deg, rad) {
            // Apply rotation
            arrow.style.transform = `rotate(${deg}deg)`;
            
            // Update Text
            degreeText.innerText = `${deg.toFixed(1)}°`;
            radText.innerText = rad.toFixed(4);
            
            // Sync inputs with some precision
            slider.value = deg;
            degInput.value = deg.toFixed(2);
            radInput.value = rad.toFixed(6);
        }

        slider.addEventListener('input', (e) => updateFromDeg(e.target.value));
        degInput.addEventListener('input', (e) => updateFromDeg(e.target.value));
        radInput.addEventListener('input', (e) => updateFromRad(e.target.value));

        // Background subtle movement pulse
        let pulseStatus = true;
        setInterval(() => {
            const container = document.querySelector('.container');
            container.style.boxShadow = pulseStatus 
                ? '0 0 60px rgba(0, 122, 255, 0.2)' 
                : '0 0 40px rgba(0, 122, 255, 0.1)';
            pulseStatus = !pulseStatus;
        }, 2000);
    </script>
</body>
</html>
